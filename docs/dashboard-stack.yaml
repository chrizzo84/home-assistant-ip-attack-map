# Top: stats + attack table (custom card)
# Bottom: world map (native Map card + geo_location source)
type: vertical-stack
cards:
  - type: custom:ip-attack-map-card
    title: Login attacks
    show_list: true
    show_map_hint: false
    max_list_items: 50
  - type: map
    title: Attacks on the map
    geo_location_sources:
      - ip_attack_map
    entities:
      - zone.home
    default_zoom: 2
    aspect_ratio: "16:9"
